# Cyberpunk2077 主题配置（站点级覆盖，优先于 themes/cyberpunk2077/_config.yml）

# 导航菜单
menu:
  首页: /
  归档: /archives
  关于: /about

# 社交链接
social:
  GitHub: https://github.com/eazonshaw/ai-knowledge-qoder

# 性能优化
performance:
  lazyload: true        # 图片懒加载
  minify: true          # 压缩 HTML
  preload: true         # 预加载关键资源

# 代码高亮
highlight:
  theme: github-dark
  line_number: true

# 文章设置
post:
  show_updated: true    # 显示更新时间
  show_word_count: true # 显示字数统计
  show_reading_time: true # 显示阅读时间

# 评论系统（暂未启用）
comments:
  enable: false
