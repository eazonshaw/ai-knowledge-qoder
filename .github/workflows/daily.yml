name: 每日抓取并部署 AI 新闻

on:
  # 每天 UTC 22:00 = 北京时间次日 06:00 触发
  schedule:
    - cron: '0 22 * * *'
  # 允许在 Actions 页面手动触发
  workflow_dispatch:
  # 推送到主分支时也构建部署（不重新抓取，仅发布已有内容）
  push:
    branches: [main, master]
    paths-ignore:
      - 'README.md'

# GitHub Pages 官方部署所需权限
permissions:
  contents: write   # 允许把新生成的文章提交回仓库
  pages: write
  id-token: write

# 同一时间只跑一个部署
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: 安装依赖
        run: npm ci || npm install

      - name: 抓取并总结当日 AI 新闻
        # push 事件不重复抓取，只有定时/手动触发才抓取
        if: github.event_name != 'push'
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          RSSHUB_BASE: ${{ secrets.RSSHUB_BASE }}
        run: npm run fetch

      - name: 提交新生成的文章
        if: github.event_name != 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add source/_posts
          if git diff --staged --quiet; then
            echo "没有新文章需要提交"
          else
            git commit -m "chore: 每日 AI 新闻自动更新 $(date -u +'%Y-%m-%d')"
            git push
          fi

      - name: 生成静态站点
        run: |
          npx hexo clean
          npx hexo generate

      - name: 上传 Pages 产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
